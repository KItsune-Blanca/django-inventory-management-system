{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm p-4">

    <h2 class="mb-3">Delete Product</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ product.name }}</strong>?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Delete
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
